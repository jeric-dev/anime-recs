<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeric's Anime Recommendations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260701g">
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>Jeric's Anime Recommendations</h1>
      <p class="hero-subtitle">Pick what you're in the mood for — mix and match filters to find something from my list.</p>
    </div>
  </header>

  <section class="filter-section">
    <div class="filter-section-inner">
      <div class="filter-controls-bar">
        <span class="filter-count" id="filter-count"></span>
        <div class="filter-actions">
          <button id="clear-filters" class="clear-btn">Clear all</button>
          <label class="toggle-18-label">
            <input type="checkbox" id="toggle-and-mode">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            Match All (AND)
          </label>
          <label class="toggle-18-label">
            <input type="checkbox" id="toggle-18plus">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            18+ Content
          </label>
        </div>
      </div>
      <div id="filter-panel"></div>
    </div>
  </section>

  <main>
    <div id="status-bar" class="status-bar hidden"></div>
    <div id="results" class="results-grid"></div>
  </main>

  <script src="app.js?v=20260701g"></script>
</body>
</html>
